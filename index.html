<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘉義天巍宮 — 官方報名系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root {
  --gold:#c9960c;--gold-light:#f5d76e;--gold-dark:#8a6500;
  --red:#8B1A1A;--red-light:#c0392b;--red-dark:#5c0f0f;
  --ink:#2c1810;--ink-muted:#6b4c3b;
  --surface:#fff9f0;--border:rgba(180,130,30,0.25);
}
html{scroll-behavior:smooth}
body{font-family:'Noto Serif TC',serif;background:#f0e4cc;min-height:100vh;color:var(--ink)}

/* HEADER */
.header{background:linear-gradient(160deg,#3d0a0a 0%,#6b1212 35%,#8B1A1A 65%,#6b1212 100%);padding:2rem 1rem 1.5rem;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(201,150,12,0.05) 20px,rgba(201,150,12,0.05) 22px)}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#f5d76e 30%,#f5d76e 70%,transparent)}
.logo-char{font-size:clamp(30px,8vw,50px);font-weight:700;color:#f5d76e;letter-spacing:8px;text-shadow:0 2px 12px rgba(0,0,0,0.5);display:block;line-height:1.2;position:relative;z-index:1}
.logo-en{font-size:11px;color:rgba(245,215,110,0.6);letter-spacing:5px;margin-top:4px;font-family:'Noto Sans TC',sans-serif;position:relative;z-index:1}
.gold-line{height:1px;background:linear-gradient(90deg,transparent,rgba(245,215,110,0.6),transparent);margin:10px auto;width:200px;position:relative;z-index:1}
.header-sub{font-size:11px;color:rgba(245,215,110,0.55);letter-spacing:3px;font-family:'Noto Sans TC',sans-serif;position:relative;z-index:1}

/* NAV */
nav{background:#1a0505;display:flex;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.nav-btn{flex:1;padding:13px 4px;background:none;border:none;cursor:pointer;color:rgba(245,215,110,0.5);font-size:clamp(11px,2.8vw,13px);letter-spacing:1px;font-family:'Noto Serif TC',serif;transition:all 0.2s;border-right:1px solid rgba(201,150,12,0.12);display:flex;align-items:center;justify-content:center;gap:4px}
.nav-btn:last-child{border-right:none}
.nav-btn.active{color:#f5d76e;background:rgba(201,150,12,0.12);font-weight:700}

/* LAYOUT */
.page{display:none;max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem}
.page.active{display:block}
.section-title{font-size:14px;font-weight:700;color:var(--red);letter-spacing:4px;text-align:center;margin:0 0 1.25rem;display:flex;align-items:center;justify-content:center;gap:10px}
.section-title::before,.section-title::after{content:'';flex:1;height:1px}
.section-title::before{background:linear-gradient(90deg,transparent,var(--gold))}
.section-title::after{background:linear-gradient(90deg,var(--gold),transparent)}

/* STEPS */
.steps{display:flex;justify-content:center;align-items:flex-start;margin:1.25rem 0 1.5rem}
.step-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:white;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink-muted);font-weight:700;transition:all 0.3s}
.step-dot.done{background:var(--red);border-color:var(--red);color:white}
.step-dot.active{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.step-label{font-size:10px;color:var(--ink-muted);letter-spacing:1px;white-space:nowrap}
.step-line{width:clamp(20px,6vw,40px);height:2px;background:var(--border);margin-top:16px;transition:background 0.3s}
.step-line.done{background:var(--red)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold))}

/* ACTIVITY CARDS */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.act-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:1.1rem;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;text-align:center}
.act-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold))}
.act-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(139,26,26,0.1)}
.act-card.selected{border-color:var(--gold);background:#fffde8;box-shadow:0 0 0 3px rgba(201,150,12,0.25)}
.act-icon{font-size:28px;margin-bottom:8px}
.act-title{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:1px;margin-bottom:4px}
.act-desc{font-size:11px;color:var(--ink-muted);line-height:1.6}
.act-price{font-size:14px;font-weight:700;color:var(--red);margin-top:8px}

/* FORM */
.fsec-title{font-size:11px;color:var(--gold-dark);letter-spacing:2px;font-weight:700;margin-bottom:10px;font-family:'Noto Sans TC',sans-serif}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;color:var(--ink-muted);letter-spacing:1px;font-family:'Noto Sans TC',sans-serif}
.form-group input,.form-group select,.form-group textarea{border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;background:white;color:var(--ink);font-family:'Noto Sans TC',sans-serif;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,150,12,0.12)}
.form-group textarea{min-height:70px;resize:none;line-height:1.6}
.req{color:var(--red-light)}

/* MULTI SELECT */
.ms-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.ms-btn{border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;cursor:pointer;background:white;color:var(--ink);transition:all 0.15s;font-family:'Noto Sans TC',sans-serif}
.ms-btn:hover{border-color:var(--gold)}
.ms-btn.sel{background:var(--red);border-color:var(--red);color:white}

/* PAYMENT */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.pay-card{border:1.5px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.2s;background:white;text-align:center}
.pay-card:hover{border-color:var(--gold)}
.pay-card.selected{border-color:var(--gold);background:#fffde8;box-shadow:0 0 0 3px rgba(201,150,12,0.2)}
.pay-icon{font-size:22px;margin-bottom:5px}
.pay-name{font-size:12px;font-weight:700;color:var(--ink)}
.pay-desc{font-size:10px;color:var(--ink-muted);margin-top:2px;font-family:'Noto Sans TC',sans-serif}
.pay-detail{background:#fffde8;border:1px solid var(--gold);border-radius:10px;padding:1rem;margin-top:8px;display:none}
.pay-detail.show{display:block}
.pay-detail-title{font-size:12px;color:var(--gold-dark);font-weight:700;margin-bottom:8px;font-family:'Noto Sans TC',sans-serif}
.bank-info{font-size:12px;color:var(--ink);line-height:2.2;font-family:'Noto Sans TC',sans-serif}
.bank-info strong{color:var(--red);font-weight:700}

/* SUMMARY */
.summary-box{background:#2c1810;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(201,150,12,0.12);font-size:12px;font-family:'Noto Sans TC',sans-serif}
.sum-row:last-of-type{border-bottom:none}
.sum-label{color:rgba(245,215,110,0.65)}
.sum-val{color:#f5d76e;font-weight:600}
.sum-total{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:6px;border-top:1px solid var(--gold)}
.sum-total .tl{color:#f5d76e;font-weight:700;font-size:13px;font-family:'Noto Sans TC',sans-serif}
.sum-total .ta{color:#f5d76e;font-weight:700;font-size:22px}

/* BUTTONS */
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#6b1212,#8B1A1A);border:none;border-radius:10px;color:#f5d76e;font-size:14px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all 0.2s;font-family:'Noto Serif TC',serif;box-shadow:0 4px 16px rgba(139,26,26,0.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,26,26,0.35)}
.btn-secondary{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:white;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink-muted)}
.btn-secondary:hover{background:#fffde8}
/* 修改這裡：讓上下兩步按鈕變成 50/50 平均大小 */
.btn-row{display:flex;gap:10px;margin-top:15px}
.btn-row button{flex:1;}

/* NOTICE */
.info-notice{background:#fffde8;border:1px solid var(--gold);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--ink-muted);line-height:1.8;margin-bottom:12px;font-family:'Noto Sans TC',sans-serif}
.info-notice strong{color:var(--red)}

/* SUCCESS */
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.success-screen{text-align:center;padding:3rem 1rem;display:none;animation:fadeIn 0.5s ease}
.success-screen.show{display:block}
.success-icon{font-size:56px;margin-bottom:1rem}
.success-title{font-size:22px;color:var(--red);font-weight:700;letter-spacing:5px;margin-bottom:8px}
.success-no{font-size:20px;color:var(--gold-dark);font-weight:700;margin:1rem 0;letter-spacing:3px;font-family:'Noto Sans TC',sans-serif}
.success-sub{font-size:12px;color:var(--ink-muted);line-height:2;font-family:'Noto Sans TC',sans-serif}

/* STEP FORM */
.step-form{display:none}
.step-form.active{display:block;animation:fadeIn 0.3s ease}

.query-card { background: white; border-radius: 12px; box-
